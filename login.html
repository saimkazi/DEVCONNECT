<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Log In — DevConnect</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
  <div class="container nav-inner">
    <a href="index.html" class="nav-brand">Dev<span>Connect</span></a>
    <a href="login.html"  class="btn-ghost"  id="nav-login">Log in</a>
    <a href="signup.html" class="btn-accent" id="nav-signup">Sign up</a>
    <div class="user-menu-wrap" id="nav-user" style="display:none">
      <button class="user-menu-trigger" id="nav-user-trigger">
        <span id="nav-username"></span>
      </button>
      <div class="user-dropdown" id="nav-user-dropdown">
        <a href="profile.html">My CV</a>
        <hr><button id="btn-logout">Log out</button>
      </div>
    </div>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Log in to manage your developer CV.</p>

    <div class="error-msg" id="error"></div>

    <div class="form-group">
      <label class="form-label" for="username">Username or Email</label>
      <input type="text" id="username" class="form-input" placeholder="e.g. andrew_h" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" id="login-btn" style="width:100%" onclick="doLogin()">Log in</button>

    <div class="auth-footer">
      No account? <a href="signup.html">Sign up</a>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  

  async function doLogin() {
    const btn      = document.getElementById('login-btn');
    const errorEl  = document.getElementById('error');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    errorEl.classList.remove('show');

    if (!username || !password) {
      errorEl.textContent = 'Please fill in both fields.';
      errorEl.classList.add('show');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Logging in…';

    try {
      await post('/api/login', { username, password });
      console.log("Login successful");
      const next = new URLSearchParams(location.search).get('next') || 'profile.html';
      console.log("Login success, redirecting...");
      window.location.href = next;
    } catch (e) {
      errorEl.textContent = e.message;
      errorEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Log in';
    }
  }

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
